name: Daily Job Agent Scraper

on:
  schedule:
    # 9:00 AM Malaysian Time (GMT+8) is 1:00 AM UTC (GMT+0)
    # Runs Monday to Friday at 1:00 AM UTC
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

env:
  TZ: Asia/Kuala_Lumpur

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Run Job Scraper Agent
        env:
          # Secrets configured in your GitHub Repo settings
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
          
          # Default configurations (can also be set as secrets to override)
          MATCH_THRESHOLD: 80
          JOBS_PER_QUERY: 10
          PROFILE_PATH: masterProfile.md
          JOB_LOCATION: Malaysia
          ENABLED_SCRAPERS: jobstreet,indeed,linkedin
          JOB_TITLES: Junior Software Developer,Junior Web Developer,Junior PHP Developer,Junior Data Analyst,IT Executive,Graduate Developer,Junior Developer
        run: |
          python agents.py --once

      - name: Save and Commit Generated Cover Letters
        # Commits cover letters generated in the run back to your repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cover_letters/ || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: save generated cover letters [skip ci]" && git push)
